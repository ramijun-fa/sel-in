<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>셀인케어 관리자 대시보드</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f4f6f8; padding: 20px; font-family: 'Pretendard', sans-serif; color: #333; }
        .admin-container { max-width: 1200px; margin: 0 auto; display: flex; gap: 20px; }
        .admin-sidebar { width: 350px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; max-height: 90vh; }
        .admin-sidebar-header { padding: 20px; background: #2b6cb0; color: white; }
        .admin-sidebar-header h2 { margin: 0; font-size: 1.2rem; }
        .admin-list { overflow-y: auto; flex: 1; padding: 10px; }
        .admin-list-item { padding: 15px; border-bottom: 1px solid #edf2f7; cursor: pointer; transition: background 0.2s; border-radius: 8px; margin-bottom: 5px; }
        .admin-list-item:hover { background: #f7fafc; }
        .admin-list-item.active { background: #ebf8ff; border: 1px solid #bee3f8; }
        .admin-main { flex: 1; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 30px; max-height: 90vh; overflow-y: auto; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .status-접수 { background: #fed7d7; color: #c53030; }
        .status-확인 { background: #feebc8; color: #dd6b20; }
        .status-답변 { background: #c6f6d5; color: #2f855a; }
        .status-예약 { background: #bee3f8; color: #2b6cb0; }
        .status-종료 { background: #e2e8f0; color: #4a5568; }

        .detail-section { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #eee; }
        .detail-section h3 { font-size: 1.1rem; color: #2b6cb0; margin-bottom: 12px; margin-top: 0; }
        .detail-grid { display: grid; grid-template-columns: 120px 1fr; gap: 10px; font-size: 0.95rem; }
        .detail-label { font-weight: bold; color: #666; }
        
        select.admin-select { padding: 8px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; width: 200px; }
        textarea.admin-textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; resize: vertical; margin-top: 8px; font-family: inherit; }
        
        .photo-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .photo-item { width: 100px; height: 100px; background: #edf2f7; border: 1px dashed #cbd5e0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #a0aec0; border-radius: 8px; text-align: center; padding: 5px; word-break: break-all; }
        
        .empty-state { text-align: center; padding: 50px; color: #a0aec0; }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 왼쪽: 코칭 신청 목록 -->
        <div class="admin-sidebar">
            <div class="admin-sidebar-header">
                <h2><i class="fa-solid fa-headset"></i> 전문가 코칭 신청 관리</h2>
            </div>
            <div class="admin-list" id="admin-req-list">
                <!-- JS에서 렌더링 -->
            </div>
        </div>

        <!-- 오른쪽: 신청 상세 정보 -->
        <div class="admin-main" id="admin-detail-view">
            <div class="empty-state">
                <i class="fa-solid fa-inbox fa-3x" style="margin-bottom:16px;"></i>
                <h2>왼쪽에서 접수 내역을 선택해주세요</h2>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
